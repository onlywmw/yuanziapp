# Yuanzi pre-commit hooks
# Install with: pre-commit install
# Run on all files: pre-commit run --all-files

repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3
        args: ["--config", "pyproject.toml"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--config", "pyproject.toml", "--fix"]
      - id: ruff-format
        args: ["--config", "pyproject.toml"]

  - repo: local
    hooks:
      - id: yuanzi-example-tests
        name: yuanzi example atom tests
        entry: bash scripts/run-pre-commit-tests.sh
        language: system
        pass_filenames: false
        files: ^yuanzi-atom-templates/examples/com\.example\.sum/
