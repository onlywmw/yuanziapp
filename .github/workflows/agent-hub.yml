name: Agent Hub — AI Team Scheduler

on:
  issues:
    types: [opened, labeled, edited]
  issue_comment:
    types: [created]

jobs:
  hub:
    # 只响应带有 AI Agent 信号的 Issue
    if: |
      contains(github.event.issue.title, '📐') ||
      contains(github.event.issue.title, '🔧') ||
      contains(github.event.issue.title, '👀') ||
      contains(github.event.issue.title, '✅') ||
      contains(github.event.issue.title, '❌') ||
      contains(github.event.issue.title, '🚨') ||
      contains(github.event.issue.body, '📐') ||
      contains(github.event.issue.body, '🔧') ||
      contains(github.event.issue.body, '👀') ||
      contains(github.event.issue.body, '✅') ||
      contains(github.event.issue.body, '❌') ||
      contains(github.event.issue.body, '🚨')

    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Agent Hub Scheduler
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .ai-agents/scheduler.py
