name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black ruff
          pip install -e yuanzi-cli[dev]
          pip install -r yuanzi-atom-templates/examples/com.example.sum/requirements.txt

      - name: Black (check)
        run: black --check --config pyproject.toml .

      - name: Ruff
        run: |
          ruff check --config pyproject.toml .
          ruff format --check --config pyproject.toml .

      - name: yuanzi-cli tests
        run: python -m pytest yuanzi-cli/tests -q

      - name: mcp-yuanzi-bridge tests
        run: python -m pytest mcp-yuanzi-bridge/tests -q

      - name: Example atom validate + tests
        run: |
          yuanzi validate yuanzi-atom-templates/examples/com.example.sum
          yuanzi test --no-validate yuanzi-atom-templates/examples/com.example.sum
