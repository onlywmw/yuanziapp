name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black ruff requests
          pip install -e yuanzi-cli[dev]
          pip install -r yuanzi-atom-templates/examples/com.example.sum/requirements.txt
          for req in base-atoms/*/requirements.txt; do
            if [ -s "$req" ]; then pip install -r "$req"; fi
          done
          pip install -r mcp-yuanzi-bridge/requirements.txt

      - name: pip-audit (dependency vulnerabilities)
        run: |
          pip install pip-audit
          pip-audit || echo "::warning::pip-audit found issues"

      - name: Black (check)
        run: black --check --config pyproject.toml .

      - name: Ruff (lint)
        run: ruff check --config pyproject.toml .

      - name: Ruff (format check)
        run: ruff format --check --config pyproject.toml .

      # ---- unit / bridge tests ----

      - name: yuanzi-cli tests
        run: python -m pytest yuanzi-cli/tests -q --tb=short

      - name: mcp-yuanzi-bridge tests
        run: python -m pytest mcp-yuanzi-bridge/tests -q

      - name: base-atoms tests
        run: python -m pytest base-atoms/tests -q --tb=short

      - name: yuanzi validate + test (com.example.sum)
        run: |
          yuanzi validate yuanzi-atom-templates/examples/com.example.sum
          yuanzi test --no-validate yuanzi-atom-templates/examples/com.example.sum
